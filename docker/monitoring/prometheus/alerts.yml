groups:
  - name: raos-api
    interval: 1m
    rules:

      # ─── High error rate ──────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="raos-api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="raos-api"}[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RAOS API error rate > 5%"
          description: "Error rate is {{ printf \"%.1f\" (mul . 100) }}% in the last 5 minutes"

      # ─── High latency ────────────────────────────────────────────
      - alert: HighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket{job="raos-api"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAOS API p95 latency > 2s"
          description: "p95 latency is {{ $value }}s"

      # ─── API down ────────────────────────────────────────────────
      - alert: ApiDown
        expr: up{job="raos-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RAOS API is DOWN"

  - name: database
    rules:

      # ─── DB connections high ─────────────────────────────────────
      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections > 80"
          description: "Current connections: {{ $value }}"

      # ─── Postgres down ───────────────────────────────────────────
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is DOWN"

  - name: redis
    rules:

      # ─── Redis down ──────────────────────────────────────────────
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is DOWN"

      # ─── Redis memory usage high ─────────────────────────────────
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 85%"
