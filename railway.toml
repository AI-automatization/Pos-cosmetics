# ROOT railway.toml — FAQAT DOKUMENTATSIYA
# Bu fayl hech qaysi Railway service tomonidan ishlatilmaydi!
#
# Har bir service Railway UI da o'z Config File Path ni ko'rsatadi:
#
#   api    service → Config File Path: apps/api/railway.toml
#   web    service → Config File Path: apps/web/railway.toml
#   bot    service → Config File Path: apps/bot/railway.toml
#   worker service → Config File Path: apps/worker/railway.toml
#
# Agar Config File Path ko'rsatilmasa — Railway bu faylni o'qiydi
# va build XATO bo'ladi! Shuning uchun Railway UI da ALBATTA
# har bir service uchun Config File Path ni to'g'ri ko'rsating.
