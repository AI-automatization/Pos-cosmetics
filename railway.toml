# Root railway.toml — used by the web service (Root Directory = /)
# Other services (api, worker, bot) have their own Root Directory set in Railway UI
# and use their own railway.toml files.

[build]
# API service — root railway.toml
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health/live"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
startCommand = "sh start.sh"
