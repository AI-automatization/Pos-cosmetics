# Root railway.toml — used by the web service (Root Directory = /)
# Other services (api, worker, bot) have their own Root Directory set in Railway UI
# and use their own railway.toml files.

[build]
# Build from repo root so Docker can access packages/types, packages/ui
dockerfilePath = "apps/api/Dockerfile"

[deploy]
startCommand = "/api/v1/health/live"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
