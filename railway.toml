[build]
# Monorepo root config — used by the "web" service (Next.js)
# The "api" service uses apps/api/railway.toml (root directory set to apps/api)
dockerfilePath = "apps/web/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
