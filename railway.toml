# Root railway.toml — used by the API service (Root Directory = /)
# Web service has Root Directory set to "apps/web" in Railway UI.
# Bot and worker have their own Root Directory set in Railway UI.

[build]
# Build from repo root so Docker can access packages/types, packages/utils
dockerfilePath = "apps/api/Dockerfile"

[deploy]
startCommand = "sh start.sh"
healthcheckPath = "/api/v1/health/live"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
