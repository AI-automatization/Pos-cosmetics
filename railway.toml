[build]
# Root railway.toml → used by `railway up` CLI for the WEB service.
# API service uses apps/api/railway.toml (Railway GitHub integration picks that up).
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = [
  "apps/web/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  ".npmrc",
  "packages/**"
]

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
