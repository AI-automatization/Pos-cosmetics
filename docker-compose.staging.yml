version: "3.9"

# ─── RAOS Staging Environment ──────────────────────────────────
# Usage:
#   docker compose -f docker-compose.staging.yml up -d
#
# Secrets: .env.staging faylidan olinadi
# SSL: Nginx Certbot orqali (letsencrypt)

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: raos-staging-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    networks:
      - raos-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: raos-staging-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata_staging:/data
    networks:
      - raos-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── API (NestJS) ─────────────────────────────────────────────
  api:
    image: ${DOCKER_REGISTRY}/raos-api:${IMAGE_TAG:-latest}
    container_name: raos-staging-api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      APP_VERSION: ${IMAGE_TAG:-0.1.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - raos-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/ping"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Web (Next.js Admin Panel) ────────────────────────────────
  web:
    image: ${DOCKER_REGISTRY}/raos-web:${IMAGE_TAG:-latest}
    container_name: raos-staging-web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - raos-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Nginx (Reverse Proxy + SSL) ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: raos-staging-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - raos-internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─── Certbot (SSL auto-renew) ─────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: raos-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"

  # ─── Database Backup (T-084) ──────────────────────────────────
  # Kunlik 02:00 UTC pg_dump → GPG → MinIO
  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    container_name: raos-backup
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS: ${MINIO_ACCESS_KEY}
      MINIO_SECRET: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${BACKUP_BUCKET:-raos-backups}
      GPG_PASSPHRASE: ${BACKUP_GPG_PASSPHRASE}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${BACKUP_TELEGRAM_CHAT_ID:-}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - raos-internal
    volumes:
      - backup_logs:/var/log
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  pgdata_staging:
  redisdata_staging:
  certbot_www:
  certbot_conf:
  backup_logs:

networks:
  raos-internal:
    driver: bridge
