appId: host.exp.exponent
name: "Inventory - LowStock va Barcode navigation"
# TALAB: Backend api :3000 da ishlayotgan, login qilingan bo'lishi kerak
---
- launchApp
- tapOn: "RAOS"
- waitForAnimationToEnd

# Login qilish (backend talab etiladi)
- tapOn: "email@misol.com"
- inputText: "admin@raos.uz"
- tapOn: "Parol kiriting"
- inputText: "password123"
- tapOn: "Kirish"
- waitForAnimationToEnd

# Omborxona tabiga o'tish
- tapOn: "Omborxona"
- assertVisible: "Omborxona"

# Kam qolgan tugmasi borilishi
- tapOn: "Kam qolgan"
- assertVisible: "Kam qolgan"
- back

# Barkod skanerga o'tish
- tapOn: "Barkod skanerlash"
- assertVisible: "Barkod skaneri"
- back

- assertVisible: "Omborxona"
