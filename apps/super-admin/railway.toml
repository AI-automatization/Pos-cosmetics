[build]
dockerfilePath = "apps/super-admin/Dockerfile"
watchPatterns = [
  "apps/super-admin/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  ".npmrc"
]

[deploy]
startCommand = "node apps/super-admin/server.js"
healthcheckPath = "/login"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
