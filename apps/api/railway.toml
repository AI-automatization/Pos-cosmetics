[build]
# Root Directory = "/" (repo root) bo'lganda ham ishlaydi
# Railway UI da: Root Directory = "/" qoldiring, Dockerfile Path = "apps/api/Dockerfile"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
