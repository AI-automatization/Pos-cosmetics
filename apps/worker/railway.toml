[build]
dockerfilePath = "apps/worker/Dockerfile"
watchPatterns = [
  "apps/worker/**",
  "apps/api/prisma/**",
  "packages/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  ".npmrc"
]

[deploy]
startCommand = "node dist/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
