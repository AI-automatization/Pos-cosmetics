name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: "Lint & TypeCheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Lint API
        run: pnpm --filter api lint

      - name: Lint Web
        run: pnpm --filter web lint

      - name: TypeCheck API
        run: pnpm --filter api exec tsc --noEmit

      - name: TypeCheck Web
        run: pnpm --filter web exec tsc --noEmit

      - name: Lint Super Admin
        run: pnpm --filter super-admin lint

      - name: TypeCheck Super Admin
        run: pnpm --filter super-admin exec tsc --noEmit

      - name: TypeCheck Worker
        run: pnpm --filter worker exec tsc --noEmit

      - name: TypeCheck Bot
        run: pnpm --filter bot exec tsc --noEmit

  security-audit:
    name: "Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true

  test:
    name: "Unit Tests"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Run API tests
        run: pnpm --filter api test

      - name: Run Worker tests
        run: pnpm --filter worker test --passWithNoTests

  build-web:
    name: "Build Web (Admin Panel)"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

  build-super-admin:
    name: "Build Super Admin"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build super-admin app
        run: pnpm --filter super-admin build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

  docker-build:
    name: "Docker Build"
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, support-bot, bot]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Builds the real per-service Dockerfile that Railway deploys. The pnpm
      # lint/test/build jobs see the full checkout, so they MISS build-context
      # bugs (a missing "COPY packages/<pkg>" in a Dockerfile, e.g. #213) — only
      # an actual image build catches those.
      - name: Build ${{ matrix.service }} image
        run: docker build -f apps/${{ matrix.service }}/Dockerfile -t raos-${{ matrix.service }}:ci .

      # Runtime smoke: api & worker require @raos/catalog-import at startup. A
      # build-only check would miss a workspace package that ships unrunnable
      # source (e.g. #214 — main pointed at raw .ts) — load it in the real
      # runner image to catch ERR_MODULE_NOT_FOUND before it reaches prod.
      - name: "Smoke: @raos/catalog-import loads in runner"
        if: ${{ matrix.service == 'api' || matrix.service == 'worker' }}
        run: docker run --rm --entrypoint node raos-${{ matrix.service }}:ci -e "require('@raos/catalog-import'); console.log('catalog-import loads OK')"

  docker-build-gate:
    # Single aggregate check so branch protection can require one "Docker Build"
    # instead of all four matrix legs. if: always() + explicit result check makes
    # a failed/skipped matrix leg fail this gate (a plain `needs` would skip it,
    # and a skipped required check does not reliably block a merge).
    name: "Docker Build"
    needs: docker-build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify Docker build matrix succeeded
        run: |
          echo "docker-build matrix result: ${{ needs.docker-build.result }}"
          [ "${{ needs.docker-build.result }}" = "success" ] || { echo "::error::Docker build matrix did not succeed"; exit 1; }

# Deploy: Railway auto-deploys on push to main via GitHub integration
# NEVER use "railway up" — see DEPLOY.md
