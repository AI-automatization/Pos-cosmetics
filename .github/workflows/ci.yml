name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: "Lint & TypeCheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Lint API
        run: pnpm --filter api lint

      - name: Lint Web
        run: pnpm --filter web lint

      - name: Lint Mobile
        run: pnpm --filter mobile lint

      - name: TypeCheck API
        run: pnpm --filter api exec tsc --noEmit

      - name: TypeCheck Web
        run: pnpm --filter web exec tsc --noEmit

# Deploy: Railway auto-deploys on push to main via GitHub integration
# NEVER use "railway up" — see memory/feedback_railway_deploy.md
